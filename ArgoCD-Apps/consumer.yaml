apiVersion: apps/v1
kind: Deployment
metadata:
  name: consumer
  namespace: default # Deploying to the same namespace as Kafka for easier DNS resolution
  labels:
    app: consumer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: consumer
  template:
    metadata:
      labels:
        app: consumer
    spec:
      containers:
      - name: consumer
        image: ghcr.io/hbacharya/devops-learn2:latest # Update this!
        imagePullPolicy: Always
        env:
        # env are not in use now
        - name: Kafka__BootstrapServers
          value: "my-cluster-kafka-bootstrap:9092"
        - name: Kafka__Topic
          value: "test"
        resources:
          limits:
            memory: "512Mi"
            cpu: "500m"
          requests:
            memory: "256Mi"
            cpu: "250m"
---
apiVersion: v1
kind: Service
metadata:
  name: consumer-svc
  namespace: default
spec:
  selector:
    app: consumer
  type: ClusterIP
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8080

---    
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: consumer-ingress
  namespace: default
  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /$2
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /consumer(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: consumer-svc
                port:
                  number: 80