apiVersion: apps/v1
kind: Deployment
metadata:
  name: producer
  namespace: kafka # Deploying to the same namespace as Kafka for easier DNS resolution
  labels:
    app: producer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: producer
  template:
    metadata:
      labels:
        app: producer
    spec:
      imagePullSecrets:
      - name: github-pull-secret
      containers:
      - name: producer
        image: ghcr.io/hbacharya/producer:c870e4350eafed281ac867b80a966d6c66ee6219---v17
        imagePullPolicy: Always
        env:
        # env are not in use now
        - name: Kafka__BootstrapServers
          value: "my-cluster-kafka-bootstrap:9092"
        - name: Kafka__Topic
          value: "test"
        resources:
          limits:
            memory: "512Mi"
            cpu: "500m"
          requests:
            memory: "256Mi"
            cpu: "250m"
---
apiVersion: v1
kind: Service
metadata:
  name: producer-svc
  namespace: kafka
spec:
  selector:
    app: producer
  type: ClusterIP
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8080
    
---

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: producer-ingress
  namespace: kafka
  annotations:
    kubernetes.io/ingress.class: "nginx"
spec:
  rules:
  - host: "producer.homelab.local"
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: producer-svc
            port:
              number: 80    