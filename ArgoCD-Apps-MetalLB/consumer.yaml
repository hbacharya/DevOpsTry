apiVersion: apps/v1
kind: Deployment
metadata:
  name: consumer
  namespace: kafka # Deploying to the same namespace as Kafka for easier DNS resolution
  labels:
    app: consumer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: consumer
  template:
    metadata:
      labels:
        app: consumer
    spec:
      containers:
      - name: consumer
        image: ghcr.io/hbacharya/consumer:3d14f9537c4348f3d394148e477d58e7d1e9191a---v14
        imagePullPolicy: Always
        env:
        # env are not in use now
        - name: Kafka__BootstrapServers
          value: "my-cluster-kafka-bootstrap:9092"
        - name: Kafka__Topic
          value: "test"
        resources:
          limits:
            memory: "512Mi"
            cpu: "500m"
          requests:
            memory: "256Mi"
            cpu: "250m"
---
apiVersion: v1
kind: Service
metadata:
  name: consumer-svc
  namespace: kafka
spec:
  selector:
    app: consumer
  type: ClusterIP
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8080

---

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: consumer-ingress
  namespace: kafka
  annotations:
    kubernetes.io/ingress.class: "nginx"
spec:
  rules:
  - host: "consumer.homelab.local"
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: consumer-svc
            port:
              number: 80   